server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=pizzaria_barueri;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:pizzaria_app}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.jwt.secret=${JWT_SECRET:trocar-por-chave-forte-com-no-minimo-32-caracteres}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
