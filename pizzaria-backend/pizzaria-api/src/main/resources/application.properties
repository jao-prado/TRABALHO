spring.application.name=pizzaria-api

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=pizzaria_barueri;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:pizzaria_app}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.jwt.secret=${JWT_SECRET:trocar-esta-chave-em-ambiente-seguro}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
